<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MIRAGE — admin</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

<header class="site-header">
    <div class="inner">
        <a href="./index.html" class="brand">
            MIRAGE<span class="tag">wear the dream.</span>
        </a>
        <nav class="nav">
            <a href="./index.html">Catalogue</a>
            <a href="./favoris.html">Favoris<span class="badge empty" data-badge="fav">0</span></a>
            <a href="./panier.html">Panier<span class="badge empty" data-badge="cart">0</span></a>
            <span class="nav-auth" data-auth-slot></span>
        </nav>
    </div>
</header>

<main class="page">
    <div class="admin-head">
        <div>
            <h1 class="page-title">Admin — produits</h1>
            <p class="page-sub" id="sub"></p>
        </div>
        <button class="btn" id="new-product">+ nouveau produit</button>
    </div>

    <div id="admin-area"></div>

    <!-- formulaire créer/éditer, masqué par défaut -->
    <div class="modal-backdrop" id="form-modal" hidden>
        <div class="modal">
            <div class="modal-head">
                <h2 id="form-title">Nouveau produit</h2>
                <button class="modal-close" data-close>×</button>
            </div>
            <form id="product-form" class="auth-form" novalidate>
                <div class="form-grid">
                    <label><span>id (slug, kebab-case)</span><input type="text" name="id" required></label>
                    <label><span>nom</span><input type="text" name="name" required></label>
                    <label class="full"><span>description</span><textarea name="description" rows="4" required></textarea></label>
                    <label><span>prix (€)</span><input type="number" name="price" step="0.01" min="0" required></label>
                    <label><span>genre</span><select name="gender"><option>unisexe</option><option>femme</option><option>homme</option></select></label>
                    <label><span>type</span><select name="type"><option>graphique</option><option>typo</option><option>minimal</option></select></label>
                    <label><span>coupe</span><select name="fit"><option>oversized</option><option>regular</option><option>cropped</option></select></label>
                    <label class="full"><span>matière</span><input type="text" name="material" value="Coton bio 220 g/m²" required></label>
                    <label><span>couleurs (séparées par virgule)</span><input type="text" name="colors" value="noir,blanc,sand" required></label>
                    <label><span>tailles (séparées par virgule)</span><input type="text" name="sizes" value="S,M,L,XL,XXL" required></label>
                    <label class="full"><span>images (URLs séparées par retour ligne)</span><textarea name="images" rows="3"></textarea></label>
                </div>
                <div class="form-error" id="form-error" hidden></div>
                <div class="form-row">
                    <button type="button" class="btn btn-outline" data-close>Annuler</button>
                    <button type="submit" class="btn" id="form-submit">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>
</main>

<footer class="site-footer">
    © MIRAGE — projet Y-Shop
</footer>

<script src="./common.js"></script>
<script src="./admin.js"></script>
</body>
</html>
